services:
  zookeeper-server:
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks: [ test-network ]


  kafka-server:
    image: bitnami/kafka:latest
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka-server:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper-server:2181
    depends_on: [ zookeeper-server ]
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks: [ test-network ]

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: "wiki_cluster"
      CASSANDRA_DATACENTER: "wiki_datacenter"
      CASSANDRA_KEYSPACE: "wiki"
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: [ "CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local'" ]
      interval: 1s
      timeout: 10s
      retries: 10
    networks: [ test-network ]

  init-cassandra:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      CASSANDRA_KEYSPACE: wiki
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
    command: [ "python", "create_cassandra_table.py" ]
    volumes:
      - ./app:/app
    networks: [ test-network ]

  init-kafka:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      kafka-server:
        condition: service_healthy
    environment:
      - BOOTSTRAP_SERVERS=kafka-server:9092
      - KAFKA_TOPIC=pages
    command: [ "python", "create_kafka_topic.py" ]
    volumes:
      - ./app:/app
    networks: [ test-network ]

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      kafka-server:
        condition: service_healthy
    environment:
      - BOOTSTRAP_SERVERS=kafka-server:9092
      - KAFKA_TOPIC=pages
      - WIKIMEDIA_URL=https://stream.wikimedia.org/v2/stream/page-create
    command: [ "python", "-u", "producer.py" ]
    volumes:
      - ./app:/app
    networks: [ test-network ]

  spark:
    image: bitnami/spark:3.5.5-debian-12-r6
    container_name: spark
    environment:
      - SPARK_MODE=master
      - CASSANDRA_KEYSPACE=wiki
      - CASSANDRA_HOST=cassandra
      - CASSANDRA_PORT=9042
      - KAFKA_TOPIC=pages
      - BOOTSTRAP_SERVERS=kafka-server:9092
      - CASSANDRA_TABLE=pages
    depends_on:
      init-cassandra:
        condition: service_completed_successfully
      init-kafka:
        condition: service_completed_successfully
      producer:
        condition: service_started
    volumes:
      - ./app:/app
      - ./data:/data
    command: >
      bash -c "
      /opt/bitnami/spark/bin/spark-submit
      --master local[*]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.2.0,com.datastax.spark:spark-cassandra-connector_2.12:3.4.1
      /app/consumer.py
      "
    ports:
      - "8080:8080"
    networks: [ test-network ]

  spark-worker:
    image: bitnami/spark:3.5.5-debian-12-r6
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
    depends_on: [ spark ]
    networks: [ test-network ]

volumes:
  cassandra_data:

networks:
  test-network:
    name: test-network
    driver: bridge
